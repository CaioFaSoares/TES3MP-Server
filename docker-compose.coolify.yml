# docker-compose.coolify.yml
# Specific docker-compose configuration for Coolify deployment

services:
  tes3mp-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # You can override server settings here via environment variables:
      - TES3MP_SERVER_HOSTNAME="Cydonia's Bonebreeze TES3MP Server"
    volumes:
      # Mount relative directory on the host VPS (Coolify will manage this persistently)
      - ./data:/server/data
    ports:
      # Exposes the default UDP port for clients to connect
      - "25565:25565/udp"
    restart: always
